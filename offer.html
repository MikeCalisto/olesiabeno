<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Публічна оферта — Олеся Beno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDFBF7;
  --bg-warm: #F7F0E8;
  --bg-card: #FFF9F4;
  --text: #2D2219;
  --text-soft: #6B5D52;
  --text-muted: #A0917F;
  --rose: #9B2D3F;
  --line: rgba(45, 34, 25, 0.1);
  --font-display: 'Lora', Georgia, serif;
  --font-body: 'Montserrat', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #EDE6DD; font-family: var(--font-body); -webkit-font-smoothing: antialiased; min-height: 100vh; color: var(--text); }
.page { max-width: 720px; margin: 0 auto; background: var(--bg); min-height: 100vh; padding: 40px 28px 60px; }
.page-back { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--rose); text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 28px; transition: opacity 0.2s ease; }
.page-back:hover { opacity: 0.7; }
.page-eyebrow { display: inline-block; font-family: var(--font-body); font-size: 11px; font-weight: 700; color: var(--rose); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 14px; }
.page-title { font-family: var(--font-display); font-size: 36px; font-weight: 600; color: var(--text); line-height: 1.2; letter-spacing: -0.015em; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
.page-content { font-family: var(--font-body); font-size: 15px; font-weight: 400; color: var(--text-soft); line-height: 1.75; }
.page-content p { margin-bottom: 16px; }
.page-content h2 { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--text); margin: 32px 0 14px; line-height: 1.3; }
.page-content h3 { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--text); margin: 22px 0 10px; }
.page-content ul, .page-content ol { margin: 0 0 16px 22px; }
.page-content li { margin-bottom: 6px; }
.page-content strong { color: var(--text); font-weight: 600; }
.page-placeholder { padding: 28px 24px; background: var(--bg-warm); border-left: 3px solid var(--rose); border-radius: 0 12px 12px 0; font-family: var(--font-display); font-style: italic; color: var(--text-soft); font-size: 15px; line-height: 1.6; }
@media (max-width: 500px) {
  .page { padding: 28px 22px 48px; }
  .page-title { font-size: 28px; }
  .page-content { font-size: 14px; }
}
</style>
</head>
<body>
<div class="page">
  <a href="index.html" class="page-back">← На головну</a>
  <span class="page-eyebrow">Юридичний документ</span>
  <h1 class="page-title">Публічна оферта</h1>
  <div class="page-content">
    <div class="page-placeholder">Текст публічної оферти буде додано пізніше.</div>
  </div>
</div>
</body>
</html>
